services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    command: >-
      sh -c "alembic -c backend/alembic.ini upgrade head &&
      uvicorn digitalcard.main:app --app-dir backend/src --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_WORKSPACE: "@digitalcard/admin"
        OUTPUT_DIR: "/app/frontend/admin/dist"
        VITE_API_BASE_URL: "http://localhost:8000/api/v1"
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  h5:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_WORKSPACE: "@digitalcard/h5"
        OUTPUT_DIR: "/app/frontend/h5/dist"
        VITE_API_BASE_URL: "http://localhost:8000/api/v1"
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api_data:

